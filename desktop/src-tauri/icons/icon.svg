  <rect width="512" height="512" rx="112" fill="url(#tile-bg)" filter="url(#tile-shadow)"/>
  <rect x="22" y="22" width="468" height="468" rx="94" fill="none" stroke="#ffffff" stroke-opacity="0.95" stroke-width="4"/>
